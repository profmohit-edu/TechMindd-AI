name: techmindd-ai

services:
  api:
    build:
      context: .
      target: api-runtime
      args:
        BUILD_SHA: ${BUILD_SHA:-local}
        BUILD_DATE: ${BUILD_DATE:-local}
    environment:
      TECHMINDD_API_KEYS: ${TECHMINDD_API_KEYS:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:8080}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-120}
      ROOT_PATH: /api
      PROVIDER: ${PROVIDER:-auto}
      PROVIDER_PRIORITY: ${PROVIDER_PRIORITY:-}
      PROVIDER_MAX_RETRIES: ${PROVIDER_MAX_RETRIES:-1}
      PROVIDER_REQUEST_TIMEOUT_SECONDS: ${PROVIDER_REQUEST_TIMEOUT_SECONDS:-60}
      RUN_TOKEN_BUDGET: ${RUN_TOKEN_BUDGET:-}
      RUN_COST_BUDGET: ${RUN_COST_BUDGET:-}
      RAG_ENABLED: ${RAG_ENABLED:-true}
      RAG_TOP_K: ${RAG_TOP_K:-5}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-1.5-flash}
    ports:
      - "8000:8000"
    volumes:
      - ./knowledge:/app/knowledge
      - ./output:/app/output
      - ./logs:/app/logs
    restart: unless-stopped

  frontend:
    profiles: ["production"]
    build:
      context: .
      target: frontend-runtime
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:80"
    restart: unless-stopped

  frontend-dev:
    profiles: ["development"]
    image: node:22-alpine
    working_dir: /app
    command: npm run dev -- --host 0.0.0.0
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  frontend_node_modules:
